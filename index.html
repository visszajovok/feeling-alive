<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feeling Alive 70.3</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<section class="hero">
  <img src="logo.png" class="logo">

  <h1>70.3 egy célért</h1>
  <p>Úszás. Kerékpár. Futás. Egy ügyért.</p>

  <a href="https://gofundme.com" class="btn">❤️ Adományozz</a>
</section>


<!-- STORY -->
<section class="container">
  <div class="card">
    <h2>Miért csinálom</h2>
    <p>
      Ide jön a személyes történeted. Ez a legfontosabb rész.
    </p>
  </div>
</section>


<!-- ADOMÁNY -->
<section class="container">
  <div class="card">
    <h2>Cél: 1 000 000 Ft</h2>

    <div class="progress">
      <div class="bar" style="width:40%"></div>
    </div>

    <p>400 000 Ft összegyűlt 🙌</p>
  </div>
</section>


<!-- COUNTDOWN -->
<section class="container">
  <div class="card center">
    <h2>Versenyig hátra</h2>
    <div id="ido"></div>
  </div>
</section>


<!-- BLOG -->
<section class="container">
  <div class="card">
    <h2>Felkészülés</h2>

    <div class="post">
      <strong>1. hét</strong>
      <p>Elkezdtem az edzést...</p>
    </div>

    <div class="post">
      <strong>2. hét</strong>
      <p>Első hosszabb futás...</p>
    </div>

  </div>
</section>


<!-- GALÉRIA -->
<section class="container">
  <div class="card">
    <h2>Galéria</h2>

    <div class="gallery">
      <img src="kep1.jpg">
      <img src="kep2.jpg">
    </div>

  </div>
</section>


<!-- FLOATING BUTTON -->
<a href="https://gofundme.com" class="float">❤️</a>

<script src="script.js"></script>

</body>
</html>
